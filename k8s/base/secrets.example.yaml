apiVersion: v1
kind: Secret
metadata:
  name: yotowebmgr-secrets
  namespace: yotowebmgr
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me
  DATABASE_URL: postgresql+psycopg://yotowebmgr:change-me@postgres:5432/yotowebmgr
  # Runtime-persisted Yoto token entries are patched into this same Secret as
  # yoto-credential-<id>.json values by the API pod via Kubernetes RBAC.
