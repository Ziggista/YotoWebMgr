apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: yotowebmgr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: yotowebmgr-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_PROXY_TARGET
              value: http://api:8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: yotowebmgr
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 5173
