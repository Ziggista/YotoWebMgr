apiVersion: v1
kind: ServiceAccount
metadata:
  name: yotowebmgr-api
  namespace: yotowebmgr
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: yotowebmgr-secret-editor
  namespace: yotowebmgr
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["yotowebmgr-secrets"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: yotowebmgr-secret-editor
  namespace: yotowebmgr
subjects:
  - kind: ServiceAccount
    name: yotowebmgr-api
    namespace: yotowebmgr
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: yotowebmgr-secret-editor
